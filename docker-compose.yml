services:
  postgres:
    image: postgres:16-alpine
    container_name: solefin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-solefin}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "8080:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-solefin}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
